<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="app.css">
    <title>FORM VALIDATION</title>
</head>
<body>
    <div class="container">
        <form id="form" action="/">
            <div class="input-control">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter username">
                <div class="error"></div>
            </div>
            <div class="input-control">
                <label for="email">Email</label>
                <input type="text" id="email" placeholder="Enter email">
                <div class="error"></div>
            </div>
            <div class="input-control">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password">
                <div class="error"></div>
            </div>
            <div class="input-control">
                <label for="password2">Confirm Password</label>
                <input type="password" id="password2" placeholder="Confirm password">
                <div class="error"></div>
            </div>
            <button id="toggleBtn" class="openModalBtn" type="submit" onclick="openPopup()">Sign Up</button>
        </form>
        <!-- MODAL POPUP -->
         <div id="myModal" class="modal">
            <div class="modal-content">
                <img src="404-tick.png" alt="success-tick logo" height="50px" width="auto">
                <h2>Welcome!</h2>
                <p>Your account has been created. Thanks!</p>
                <button id="closeModalBtn" type="button" onclick="closePopup()">Close</button>
            </div>
        </div>
      <footer class="footer">
           <p>&copy; 2026 Fortune U. Emmanuel. All rights reserved.</p>
       </footer>
    </div>
   
    <script defer src="form-validation.js"></script>
    <script defer src="modal-popup.js"></script>
</body>
</html>
